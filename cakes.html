<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="In our speciality cakes section, your can find a selection of delicious, premium whole cakes that are perfect for any occasion."
    />
    <title>Sweet as Sugar | Specialty Cakes Page</title>

    <!-- Favicons made by Favicon.io -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/images/favicon-16x16.png"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Custom CSS. Always below Bootstrapso it can oerride it -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <!-- Navigation -->

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container">
        <!--Changed container fluid to container so the navbar has the same margin as the rest of the page-->
        <a class="navbar-brand" href="#">Navbar</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav ms-auto">
            <!--ms-auto moves the option to the right-->
            <a class="nav-link" href="index.html">Our Home</a>
            <a class="nav-link" href="menu.html"
              >Our Menu</a
            >
            <a class="nav-link active" aria-current="page" href="cakes.html">Our Specialty Cakes</a>
            <a class="nav-link" href="#">Contact Us</a>
          </div>
        </div>
      </div>
    </nav>
    <!-- Header with carousel -->
    <header class="container">
      <div class="row">
        <div class="col-12 col-xl-6">Sweet as Sugar Speciality Cakes description</div>
        <div class="col-12 col-xl-6">Carousel</div>
      </div>
    </header>

    <!-- main element to hold all key sections of the home page. It is not part of the grid structure -->
    <main>

      <!-- cake list section -->
      <section class="container">
        <div class="row">
          <div class="col-12">cake heading</div>
          <div class="col-12 col-md-6 col-xl-3">Cake and description card</div>
          <div class="col-12 col-md-6 col-xl-3">Cake and description card</div>
          <div class="col-12 col-md-6 col-xl-3">Cake and description card</div>
          <div class="col-12 col-md-6 col-xl-3">Cake and description card</div>
        </div>
      </section>
    </main>

    <!-- Footer / contact section -->
    <!-- mt-auto added to push footer to the bottom of the page -->
    <footer class="mt-auto">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12">Contact section heading</div>
          <!-- Contact info -->
          <div class="col-12 col-md-6 col-xl-4">
            Contact info & social links
          </div>
          <!-- Opening times -->
          <div class="col-12 col-md-6 col-xl-4">Opening times</div>
        </div>
      </div>
    </footer>

    <!-- JavaScript Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Font Awesome kit -->
    <script
      src="https://kit.fontawesome.com/c42d14fba5.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
